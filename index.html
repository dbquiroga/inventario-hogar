<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Inventario del Hogar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --surface2: #21253a;
      --border: #2d3250;
      --primary: #6c8ef7;
      --primary-dark: #4f7ef8;
      --primary-light: #1a2040;
      --danger: #f87171;
      --danger-light: #2a1a1a;
      --warning: #fbbf24;
      --warning-light: #2a2010;
      --success: #34d399;
      --success-light: #0d2a1f;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-light: #64748b;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.5), 0 2px 4px -1px rgba(0,0,0,.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Auth screen ── */
    #authScreen {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #authScreen.visible { display: flex; }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-md);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .auth-logo {
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .auth-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .auth-sub {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .auth-tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 24px;
      gap: 2px;
    }

    .auth-tab {
      flex: 1;
      padding: 7px;
      border: none;
      background: transparent;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
    }
    .auth-tab.active { background: var(--primary); color: #fff; }

    .auth-field {
      margin-bottom: 14px;
    }
    .auth-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .auth-field input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .auth-field input:focus { border-color: var(--primary); }

    .auth-btn {
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background .15s;
    }
    .auth-btn:hover { background: var(--primary-dark); }
    .auth-btn:disabled { opacity: .6; cursor: not-allowed; }

    .auth-error {
      display: none;
      background: var(--danger-light);
      border: 1px solid var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--danger);
      margin-top: 12px;
    }
    .auth-error.visible { display: block; }

    /* ── App ── */
    #appScreen { display: none; }
    #appScreen.visible { display: block; }

    /* ── Loading ── */
    #loadingScreen {
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: var(--text-muted);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-actions { display: flex; gap: 8px; align-items: center; }
    .user-email { font-size: 12px; color: var(--text-muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); }
    .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 6px; }
    .btn-icon { padding: 6px; border-radius: 6px; }

    /* ── Main layout ── */
    main { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    /* ── Stats row ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .stat-value { font-size: 26px; font-weight: 700; }
    .stat-card.alert .stat-value { color: var(--danger); }
    .stat-card.ok .stat-value { color: var(--success); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 10px 18px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      border-radius: 6px 6px 0 0;
      transition: all .15s;
    }
    .tab:hover { background: var(--surface2); color: var(--text); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--primary-light); }
    .tab .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 999px;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      margin-left: 4px;
    }
    .tab .badge.hidden { display: none; }

    /* ── Panel ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--primary); }

    .filter-select {
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface2); }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr.low-stock { background: var(--warning-light); }
    tr.critical-stock { background: var(--danger-light); }

    .item-name { font-weight: 500; }
    .item-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    .qty-display { display: flex; align-items: center; gap: 8px; }
    .qty-pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .qty-ok { background: var(--success-light); color: var(--success); }
    .qty-low { background: var(--warning-light); color: var(--warning); }
    .qty-critical { background: var(--danger-light); color: var(--danger); }

    .inline-edit {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .qty-input {
      width: 60px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      background: var(--surface2);
      color: var(--text);
      outline: none;
    }
    .qty-input:focus { border-color: var(--primary); }

    .actions-cell { display: flex; gap: 4px; justify-content: flex-end; }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .empty-state svg { color: var(--text-light); margin-bottom: 12px; }
    .empty-state p { font-size: 15px; margin-bottom: 4px; }
    .empty-state small { font-size: 12px; }

    /* ── Shopping list panel ── */
    #panel-compras .section-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .shopping-list-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .shopping-empty {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
    }

    .shopping-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .shopping-item:last-child { border-bottom: none; }
    .shopping-item-name { font-weight: 500; }
    .shopping-item-detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .shopping-item-qty {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      white-space: nowrap;
      text-align: right;
    }
    .shopping-item-unit { font-size: 11px; color: var(--text-muted); }

    .export-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .export-box textarea {
      width: 100%;
      min-height: 180px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      resize: vertical;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      margin-bottom: 10px;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 14px;
      box-shadow: var(--shadow-md), 0 20px 40px rgba(0,0,0,.15);
      width: 100%;
      max-width: 460px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      border-radius: 6px;
    }
    .modal-close:hover { background: var(--surface2); }

    .modal-body { padding: 20px 24px; }
    .modal-footer {
      padding: 0 24px 20px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* ── Form ── */
    .form-grid { display: grid; gap: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .field input, .field select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus, .field select:focus { border-color: var(--primary); }

    /* ── Toast ── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--text);
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      box-shadow: var(--shadow-md);
      animation: slideIn .2s ease;
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to   { transform: translateX(0);   opacity: 1; }
    }

    /* ── Alert banner ── */
    .alert-banner {
      display: none;
      background: var(--warning-light);
      border: 1px solid #fcd34d;
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #92400e;
      align-items: center;
      gap: 10px;
    }
    .alert-banner.visible { display: flex; }
    .alert-banner strong { font-weight: 600; }

    /* ── Mobile cards ── */
    .mobile-list { display: none; }

    .mobile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .mobile-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }
    .mobile-card-name { font-weight: 600; font-size: 15px; flex: 1; }
    .mobile-card-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .mobile-card-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .mobile-card-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 13px;
    }
    .mobile-field label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 3px;
    }
    .mobile-qty-wrap { display: flex; align-items: center; gap: 6px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 0 14px; }
      main { padding: 16px 10px; }
      .form-row { grid-template-columns: 1fr; }
      .logo span { display: none; }
      .user-email { display: none; }
      .table-wrap { display: none; }
      .mobile-list { display: block; }
      .stats { grid-template-columns: 1fr 1fr; }
      .btn-primary span { display: none; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <span>Cargando…</span>
</div>

<!-- Auth screen -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">🏠</div>
    <div class="auth-title">Inventario del Hogar</div>
    <div class="auth-sub">Iniciá sesión para acceder a tu inventario</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Ingresar</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Registrarse</button>
    </div>

    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="tu@email.com" autocomplete="email" />
    </div>
    <div class="auth-field">
      <label>Contraseña</label>
      <input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doAuth()" />
    </div>

    <button class="auth-btn" id="authBtn" onclick="doAuth()">Ingresar</button>

    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- App screen -->
<div id="appScreen">
  <!-- Header -->
  <header>
    <div class="logo">
      🏠 <span>Inventario del Hogar</span>
    </div>
    <div class="header-actions">
      <span class="user-email" id="userEmail"></span>
      <button class="btn btn-primary" onclick="openModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo ítem
      </button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Salir</button>
    </div>
  </header>

  <!-- Main -->
  <main>
    <!-- Stats -->
    <div class="stats" id="statsRow"></div>

    <!-- Alert banner -->
    <div class="alert-banner" id="alertBanner">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span id="alertText"></span>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="tabsRow"></div>

    <!-- Panels per category -->
    <div id="panelsContainer"></div>

    <!-- Shopping panel -->
    <div id="panel-compras" class="panel">
      <p class="section-title">
        🛒 Lista de Compras Sugerida
        <small style="font-size:12px;color:var(--text-muted);font-weight:400;">Ítems bajo mínimo + proyección de consumo mensual</small>
      </p>
      <div class="shopping-list-wrap" id="shoppingListWrap"></div>

      <div class="export-box" style="margin-top:20px;">
        <p style="font-size:13px;font-weight:600;margin-bottom:10px;">📋 Exportar como texto</p>
        <textarea id="exportText" readonly></textarea>
        <button class="btn btn-ghost" onclick="copyExport()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copiar
        </button>
      </div>
    </div>
  </main>

  <!-- Modal agregar/editar -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <p class="modal-title" id="modalTitle">Nuevo ítem</p>
        <button class="modal-close" onclick="closeModal()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="field">
            <label>Nombre *</label>
            <input type="text" id="f_nombre" placeholder="Ej: Detergente" />
          </div>
          <div class="form-row">
            <div class="field">
              <label>Categoría *</label>
              <select id="f_categoria" onchange="updateSubcats()">
                <option value="">Seleccionar…</option>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // ── Supabase init ──────────────────────────────────────────────────────
  const SUPABASE_URL = 'https://bbwhvmeshobgtnwszxyx.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJid2h2bWVzaG9iZ3Rud3N6eHl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1Njc1MDIsImV4cCI6MjA5NzE0MzUwMn0.abEtHsfuuKawsEl4OMC98JZtdOIzYaCDFzNTktT6Kak';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── Constants ─────────────────────────────────────────────────────────
  const SUBCATS = {

  const DEFAULT_DATA = [

    { nombre: 'Papas', categoria: 'Comida', subcategoria: 'Verduras', cantidad_actual: 3, cantidad_minima: 2, consumo_mensual: 5, unidad: 'kg' },
    { nombre: 'Arroz', categoria: 'Comida', subcategoria: 'Otros', cantidad_actual: 1, cantidad_minima: 2, consumo_mensual: 2, unidad: 'kg' },

    { nombre: 'Gaseosa', categoria: 'Bebidas', subcategoria: 'Otros', cantidad_actual: 2, cantidad_minima: 3, consumo_mensual: 6, unidad: 'litros' },

    { nombre: 'Clavos 2"', categoria: 'Herramientas', subcategoria: 'Clavos', cantidad_actual: 30, cantidad_minima: 20, consumo_mensual: 10, unidad: 'unidades' },
    { nombre: 'Tarugos fischer 6', categoria: 'Herramientas', subcategoria: 'Tarugos', cantidad_actual: 8, cantidad_minima: 15, consumo_mensual: 5, unidad: 'unidades' },
    { nombre: 'Cinta de aislar', categoria: 'Herramientas', subcategoria: 'Otros', cantidad_actual: 2, cantidad_minima: 1, consumo_mensual: 0.5, unidad: 'rollos' },
  ];

  // ── State ──────────────────────────────────────────────────────────────
  const state = {
    items: [],
    activeTab: CATEGORIES[0],
    editId: null,
    searchTerms: {},
    subfilters: {},
    user: null,
    authMode: 'login',
  };

  // ── Screens ──────────────────────────────────────────────────────────
  function showScreen(name) {
    document.getElementById('loadingScreen').style.display = name === 'loading' ? 'flex' : 'none';
    document.getElementById('authScreen').classList.toggle('visible', name === 'auth');
    document.getElementById('appScreen').classList.toggle('visible', name === 'app');
  }

  // ── Auth ──────────────────────────────────────────────────────────────
  function switchAuthTab(mode) {
    state.authMode = mode;
    document.querySelectorAll('.auth-tab').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && mode === 'login') || (i === 1 && mode === 'register'));
    });
    document.getElementById('authBtn').textContent = mode === 'login' ? 'Ingresar' : 'Registrarse';
    document.getElementById('authError').classList.remove('visible');
  }

  async function doAuth() {
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const btn = document.getElementById('authBtn');
    const errEl = document.getElementById('authError');

    if (!email || !password) {
      showAuthError('Completá email y contraseña');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Cargando…';
    errEl.classList.remove('visible');

    let result;
    if (state.authMode === 'login') {
      result = await sb.auth.signInWithPassword({ email, password });
    } else {
      result = await sb.auth.signUp({ email, password });
    }

    btn.disabled = false;
    btn.textContent = state.authMode === 'login' ? 'Ingresar' : 'Registrarse';

    if (result.error) {
      showAuthError(translateAuthError(result.error.message));
      return;
    }

    if (state.authMode === 'register' && result.data.user && !result.data.session) {
      showAuthError('¡Registrado! Revisá tu email para confirmar la cuenta.');
      return;
    }
  }

  function showAuthError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function translateAuthError(msg) {
    if (msg.includes('Invalid login')) return 'Email o contraseña incorrectos';
    if (msg.includes('Email not confirmed')) return 'Confirmá tu email antes de ingresar';
    if (msg.includes('User already registered')) return 'Este email ya está registrado';
    if (msg.includes('Password should')) return 'La contraseña debe tener al menos 6 caracteres';
    return msg;
  }

  async function doLogout() {
    await sb.auth.signOut();
    state.items = [];
    state.user = null;
    showScreen('auth');
  }

  // ── Data loading ──────────────────────────────────────────────────────
  async function loadItems() {
    const { data, error } = await sb
      .from('items')
      .select('*')
      .order('created_at', { ascending: true });

    if (error) {
      toast('Error al cargar datos: ' + error.message, 'error');
      return;
    }

    state.items = data || [];

    // First login: seed with default data
    if (state.items.length === 0) {
      await seedDefaultData();
    }
  }

  async function seedDefaultData() {
    const userId = state.user.id;
    const rows = DEFAULT_DATA.map(d => ({ ...d, user_id: userId }));
    const { data, error } = await sb.from('items').insert(rows).select();
    if (!error && data) state.items = data;
  }

  // ── Helpers ──────────────────────────────────────────────────────────
  function stockStatus(item) {
    if (item.cantidad_actual <= 0) return 'critical';
    if (item.cantidad_actual < item.cantidad_minima * 0.5) return 'critical';
    if (item.cantidad_actual < item.cantidad_minima) return 'low';
    return 'ok';
  }

  function itemsBelow(cat) {
    return state.items.filter(i => i.categoria === cat && stockStatus(i) !== 'ok');
  }

  function allBelow() {
    return state.items.filter(i => stockStatus(i) !== 'ok');
  }

  // ── Rendering ────────────────────────────────────────────────────────
  function render() {
    renderStats();
    renderAlert();
    renderTabs();
    renderPanels();
    renderShoppingList();
  }

  function renderStats() {
    const total = state.items.length;
    const below = allBelow().length;
    const critical = state.items.filter(i => stockStatus(i) === 'critical').length;
    const ok = total - below;

    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Total de ítems</div>
        <div class="stat-value">${total}</div>
      </div>
      <div class="stat-card ok">
        <div class="stat-label">Stock OK</div>
        <div class="stat-value">${ok}</div>
      </div>
      <div class="stat-card" style="border-color:#fcd34d">
        <div class="stat-label">Bajo mínimo</div>
        <div class="stat-value" style="color:var(--warning)">${below}</div>
      </div>
      <div class="stat-card alert">
        <div class="stat-label">Sin stock</div>
        <div class="stat-value">${critical}</div>
      </div>
    `;
  }

  function renderAlert() {
    const below = allBelow();
    const banner = document.getElementById('alertBanner');
    const txt = document.getElementById('alertText');
    if (below.length > 0) {
      txt.innerHTML = `<strong>${below.length} ítem${below.length > 1 ? 's' : ''} bajo el mínimo.</strong> Revisá la pestaña <em>Lista de Compras</em>.`;
      banner.classList.add('visible');
    } else {
      banner.classList.remove('visible');
    }
  }

  function renderTabs() {
    const container = document.getElementById('tabsRow');
    let html = '';

    CATEGORIES.forEach(cat => {
      const n = itemsBelow(cat).length;
      const active = state.activeTab === cat ? 'active' : '';
      html += `<button class="tab ${active}" onclick="setTab('${cat}')">
        ${cat} <span class="badge ${n === 0 ? 'hidden' : ''}">${n}</span>
      </button>`;
    });

    html += `<button class="tab ${state.activeTab === 'compras' ? 'active' : ''}" onclick="setTab('compras')">
      🛒 Lista de Compras
      <span class="badge ${allBelow().length === 0 ? 'hidden' : ''}">${allBelow().length}</span>
    </button>`;

    container.innerHTML = html;
  }

  function renderPanels() {
    const container = document.getElementById('panelsContainer');
    container.innerHTML = '';

    CATEGORIES.forEach(cat => {
      const div = document.createElement('div');
      div.className = `panel ${state.activeTab === cat ? 'active' : ''}`;
      div.id = `panel-${cat.replace(/\s/g, '_')}`;
      div.innerHTML = buildCategoryPanel(cat);
      container.appendChild(div);
    });

    document.getElementById('panel-compras').className =
      `panel ${state.activeTab === 'compras' ? 'active' : ''}`;
  }

  function buildCategoryPanel(cat) {
    const search = state.searchTerms[cat] || '';
    const subfilter = state.subfilters[cat] || '';
    const subcats = SUBCATS[cat];

    let items = state.items.filter(i => i.categoria === cat);

    if (search) {
      const q = search.toLowerCase();
      items = items.filter(i => i.nombre.toLowerCase().includes(q));
    }
    if (subfilter) {
      items = items.filter(i => i.subcategoria === subfilter);
    }

    let subcatSelect = '';
    if (subcats.length > 0) {
      const opts = subcats.map(s => `<option ${subfilter === s ? 'selected' : ''}>${s}</option>`).join('');
      subcatSelect = `<select class="filter-select" onchange="setSubfilter('${cat}', this.value)">
        <option value="">Todas las subcategorías</option>${opts}
      </select>`;
    }

    const rows = items.map(item => {
      const st = stockStatus(item);
      const rowClass = st === 'critical' ? 'critical-stock' : st === 'low' ? 'low-stock' : '';
      const pillClass = st === 'critical' ? 'qty-critical' : st === 'low' ? 'qty-low' : 'qty-ok';
      const sub = item.subcategoria ? `<div class="item-sub">${item.subcategoria}</div>` : '';
      return `<tr class="${rowClass}">
        <td><div class="item-name">${escHtml(item.nombre)}</div>${sub}</td>
        <td>
          <div class="qty-display">
            <div class="inline-edit">
              <input class="qty-input" type="number" min="0" step="0.1"
                value="${item.cantidad_actual}"
                onchange="updateQty('${item.id}', this.value)"
                title="Editar cantidad" />
            </div>
            <span class="qty-pill ${pillClass}">${item.cantidad_actual} ${item.unidad}</span>
          </div>
        </td>
        <td>${item.cantidad_minima} ${item.unidad}</td>
        <td>${item.consumo_mensual || '—'} ${item.consumo_mensual ? item.unidad + '/mes' : ''}</td>
        <td>
          <div class="actions-cell">
            <button class="btn btn-ghost btn-sm btn-icon" title="Editar" onclick="openModal('${item.id}')">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn btn-ghost btn-sm btn-icon" title="Eliminar" onclick="deleteItem('${item.id}')">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
            </button>
          </div>
        </td>
      </tr>`;
    }).join('');

    const emptyMsg = items.length === 0
      ? `<tr><td colspan="5">
          <div class="empty-state">
            <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            <p>Sin ítems${search || subfilter ? ' para este filtro' : ' en esta categoría'}</p>
            <small>Usá el botón <strong>Agregar</strong> para incorporar ítems</small>
          </div>
        </td></tr>` : '';

    // Mobile cards
    const mobileCards = items.length === 0
      ? `<div class="empty-state">
          <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <p>Sin ítems${search || subfilter ? ' para este filtro' : ' en esta categoría'}</p>
        </div>`
      : items.map(item => {
          const st = stockStatus(item);
          const pillClass = st === 'critical' ? 'qty-critical' : st === 'low' ? 'qty-low' : 'qty-ok';
          const borderColor = st === 'critical' ? 'var(--danger)' : st === 'low' ? 'var(--warning)' : 'var(--border)';
          const sub = item.subcategoria ? `<div class="mobile-card-sub">${item.subcategoria}</div>` : '';
          return `<div class="mobile-card" style="border-color:${borderColor}">
            <div class="mobile-card-top">
              <div>
                <div class="mobile-card-name">${escHtml(item.nombre)}</div>
                ${sub}
              </div>
              <div class="mobile-card-actions">
                <button class="btn btn-ghost btn-sm btn-icon" onclick="openModal('${item.id}')">✏️</button>
                <button class="btn btn-danger btn-sm btn-icon" onclick="deleteItem('${item.id}')">🗑</button>
              </div>
            </div>
            <div class="mobile-card-body">
              <div class="mobile-field">
                <label>Cantidad actual</label>
                <div class="mobile-qty-wrap">
                  <input class="qty-input" type="number" min="0" step="0.1"
                    value="${item.cantidad_actual}"
                    onchange="updateQty('${item.id}', this.value)" />
                  <span class="qty-pill ${pillClass}">${item.cantidad_actual} ${item.unidad}</span>
                </div>
              </div>
              <div class="mobile-field">
                <label>Mínimo</label>
                <span>${item.cantidad_minima} ${item.unidad}</span>
              </div>
            </div>
          </div>`;
        }).join('');

    return `
      <div class="toolbar">
        <div class="search-wrap">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" type="text" placeholder="Buscar…"
            value="${escAttr(search)}"
            oninput="setSearch('${cat}', this.value)" />
        </div>
        ${subcatSelect}
        <button class="btn btn-primary btn-sm" onclick="openModal(null, '${cat}')">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>Agregar</span>
        </button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Cantidad actual</th>
              <th>Mínimo</th>
              <th>Consumo/mes</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${rows || emptyMsg}
          </tbody>
        </table>
      </div>
      <div class="mobile-list">${mobileCards}</div>
    `;
  }

  function renderShoppingList() {
    const below = allBelow();
    const wrap = document.getElementById('shoppingListWrap');
    const exportArea = document.getElementById('exportText');

    if (below.length === 0) {
      wrap.innerHTML = `<div class="shopping-empty">✅ Todo el inventario está en stock. ¡Nada que comprar!</div>`;
      exportArea.value = '';
      return;
    }

    let html = '';
    let exportLines = ['🛒 LISTA DE COMPRAS — ' + new Date().toLocaleDateString('es-AR'), ''];
    let lastCat = '';

    const sorted = [...below].sort((a, b) => a.categoria.localeCompare(b.categoria));

    sorted.forEach(item => {
      const needed = Math.max(0, item.cantidad_minima - item.cantidad_actual);
      const monthly = item.consumo_mensual || 0;
      const suggested = Math.ceil(Math.max(needed, monthly) * 1.1);

      const sub = item.subcategoria ? ` · ${item.subcategoria}` : '';
      const status = stockStatus(item);
      const badge = status === 'critical'
        ? `<span style="color:var(--danger);font-weight:700;">⚠ Sin stock</span>`
        : `<span style="color:var(--warning);font-weight:600;">↓ Bajo mínimo</span>`;

      if (item.categoria !== lastCat) {
        if (lastCat) exportLines.push('');
        exportLines.push(`── ${item.categoria.toUpperCase()} ──`);
        lastCat = item.categoria;
        html += `<div style="padding:8px 16px;background:var(--surface2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);border-bottom:1px solid var(--border);">${item.categoria}</div>`;
      }

      exportLines.push(`• ${item.nombre}${item.subcategoria ? ' (' + item.subcategoria + ')' : ''}: ${suggested} ${item.unidad}  (actual: ${item.cantidad_actual}, mín: ${item.cantidad_minima})`);

      html += `<div class="shopping-item">
        <div class="shopping-item-info">
          <div class="shopping-item-name">${escHtml(item.nombre)}</div>
          <div class="shopping-item-detail">${item.categoria}${sub} · Actual: ${item.cantidad_actual} ${item.unidad} · Mín: ${item.cantidad_minima} ${item.unidad} · ${badge}</div>
        </div>
        <div>
          <div class="shopping-item-qty">${suggested}</div>
          <div class="shopping-item-unit">${item.unidad}</div>
        </div>
      </div>`;
    });

    exportLines.push('', `Generado: ${new Date().toLocaleString('es-AR')}`);
    wrap.innerHTML = html;
    exportArea.value = exportLines.join('\n');
  }

  // ── Actions ───────────────────────────────────────────────────────────
  function setTab(cat) {
    state.activeTab = cat;
    render();
  }

  function setSearch(cat, val) {
    state.searchTerms[cat] = val;
    renderPanels();
  }

  function setSubfilter(cat, val) {
    state.subfilters[cat] = val;
    renderPanels();
  }

  async function updateQty(id, val) {
    const qty = parseFloat(val) || 0;
    const { error } = await sb.from('items').update({ cantidad_actual: qty }).eq('id', id);
    if (error) { toast('Error al actualizar', 'error'); return; }

    const item = state.items.find(i => i.id === id);
    if (item) item.cantidad_actual = qty;

    renderStats();
    renderAlert();
    renderTabs();
    renderShoppingList();
    renderPanels();
  }

  async function deleteItem(id) {
    if (!confirm('¿Eliminar este ítem del inventario?')) return;
    const { error } = await sb.from('items').delete().eq('id', id);
    if (error) { toast('Error al eliminar', 'error'); return; }

    state.items = state.items.filter(i => i.id !== id);
    render();
    toast('Ítem eliminado', 'default');
  }

  function copyExport() {
    const ta = document.getElementById('exportText');
    ta.select();
    document.execCommand('copy');
    toast('Lista copiada al portapapeles ✓', 'success');
  }

  // ── Modal ─────────────────────────────────────────────────────────────
  function openModal(id = null, prefillCat = null) {
    state.editId = id || null;
    const modal = document.getElementById('modalOverlay');
    const title = document.getElementById('modalTitle');

    if (id) {
      const item = state.items.find(i => i.id === id);
      if (!item) return;
      title.textContent = 'Editar ítem';
      document.getElementById('f_nombre').value = item.nombre;
      document.getElementById('f_categoria').value = item.categoria;
      updateSubcats();
      document.getElementById('f_subcategoria').value = item.subcategoria || '';
      document.getElementById('f_cantidad').value = item.cantidad_actual;
      document.getElementById('f_unidad').value = item.unidad;
      document.getElementById('f_minimo').value = item.cantidad_minima;
      document.getElementById('f_consumo').value = item.consumo_mensual || '';
    } else {
      title.textContent = 'Nuevo ítem';
      document.getElementById('f_nombre').value = '';
      document.getElementById('f_categoria').value = prefillCat || '';
      updateSubcats();
      document.getElementById('f_cantidad').value = '';
      document.getElementById('f_unidad').value = 'unidades';
      document.getElementById('f_minimo').value = '';
      document.getElementById('f_consumo').value = '';
    }

    modal.classList.add('open');
    setTimeout(() => document.getElementById('f_nombre').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    state.editId = null;
  }

  function updateSubcats() {
    const cat = document.getElementById('f_categoria').value;
    const sel = document.getElementById('f_subcategoria');
    const subs = SUBCATS[cat] || [];
    sel.innerHTML = `<option value="">—</option>` +
      subs.map(s => `<option>${s}</option>`).join('');
  }

  async function saveItem() {
    const nombre = document.getElementById('f_nombre').value.trim();
    const categoria = document.getElementById('f_categoria').value;
    const subcategoria = document.getElementById('f_subcategoria').value;
    const cantidad_actual = parseFloat(document.getElementById('f_cantidad').value);
    const unidad = document.getElementById('f_unidad').value;
    const cantidad_minima = parseFloat(document.getElementById('f_minimo').value);
    const consumo_mensual = parseFloat(document.getElementById('f_consumo').value) || 0;

    if (!nombre || !categoria || isNaN(cantidad_actual) || isNaN(cantidad_minima)) {
      toast('Completá los campos obligatorios (*)', 'error');
      return;
    }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Guardando…';

    if (state.editId) {
      const { data, error } = await sb.from('items')
        .update({ nombre, categoria, subcategoria, cantidad_actual, unidad, cantidad_minima, consumo_mensual })
        .eq('id', state.editId)
        .select()
        .single();

      if (error) { toast('Error al actualizar', 'error'); }
      else {
        const idx = state.items.findIndex(i => i.id === state.editId);
        if (idx >= 0) state.items[idx] = data;
        toast('Ítem actualizado ✓', 'success');
      }
    } else {
      const { data, error } = await sb.from('items')
        .insert({ nombre, categoria, subcategoria, cantidad_actual, unidad, cantidad_minima, consumo_mensual, user_id: state.user.id })
        .select()
        .single();

      if (error) { toast('Error al agregar', 'error'); }
      else {
        state.items.push(data);
        state.activeTab = categoria;
        toast('Ítem agregado ✓', 'success');
      }
    }

    btn.disabled = false;
    btn.textContent = 'Guardar';
    closeModal();
    render();
  }

  // ── Toast ─────────────────────────────────────────────────────────────
  function toast(msg, type = 'default') {
    const c = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  // ── Utils ─────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) { return escHtml(s); }

  // ── Keyboard ──────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('open')) {
      if (e.target.tagName !== 'BUTTON') saveItem();
    }
  });

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // ── Init ──────────────────────────────────────────────────────────────
  // Limpiar localStorage viejo (versión pre-Supabase)
  try {
    ['inventario_hogar_v1', 'inventario_hogar_v2'].forEach(k => localStorage.removeItem(k));
  } catch(e) {}

  showScreen('loading');

  // Timeout de seguridad: si Supabase no responde en 6s, mostrar login
  const authTimeout = setTimeout(() => showScreen('auth'), 6000);

  sb.auth.onAuthStateChange(async (event, session) => {
    clearTimeout(authTimeout);
    if (session?.user) {
      state.user = session.user;
      document.getElementById('userEmail').textContent = session.user.email;
      showScreen('loading');
      await loadItems();
      showScreen('app');
      render();
    } else {
      showScreen('auth');
    }
  });
</script>
</body>
</html>
